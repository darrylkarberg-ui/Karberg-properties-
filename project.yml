name: KarbergProperties
options:
  bundleIdPrefix: de.karberg
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: de.karberg.properties
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 11.0.0

targets:
  KarbergProperties:
    type: application
    platform: iOS
    sources:
      - path: ios/Sources
    resources:
      - path: ios/Resources
    info:
      path: ios/Resources/Info.plist
      properties:
        CFBundleDisplayName: Karberg Properties
        UILaunchScreen: {}
        UIUserInterfaceStyle: Automatic
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseCore
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
