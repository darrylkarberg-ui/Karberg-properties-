name: iOS Build (Simulator)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode project
        run: |
          xcodegen generate

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project KarbergProperties.xcodeproj

      - name: Build (iPhone Simulator)
        run: |
          # Use a generic simulator destination to avoid device-name mismatches on GitHub runners.
          set -o pipefail
          xcodebuild \
            -project KarbergProperties.xcodeproj \
            -scheme KarbergProperties \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore

      - name: Upload diagnostic reports (optional)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-diagnostic-reports
          path: ~/Library/Logs/DiagnosticReports
          if-no-files-found: ignore
